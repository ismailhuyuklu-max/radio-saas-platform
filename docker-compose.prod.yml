services:
  postgres:
    image: postgres:16-alpine
    container_name: radio-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radio_saas}
      POSTGRES_USER: ${POSTGRES_USER:-radio_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      TZ: Europe/Istanbul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Faz UX-tune: PG için anahtar tuning. 8 GB RAM sunucuda 256 MB
    # shared_buffers + 64 MB work_mem yeterli. log_min_duration_statement
    # ile 500 ms üstü sorgular PG log'una düşer (H5-2 PDO slow log'unun
    # DB tarafı eşdeğeri). max_connections 50 = PHP 3 worker + worker
    # container + backup + drill için bol.
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=64MB
      -c maintenance_work_mem=128MB
      -c max_connections=50
      -c log_min_duration_statement=500
      -c log_line_prefix='%t [%p] %u@%d '
      -c log_statement=ddl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radio_saas} -d ${POSTGRES_DB:-radio_saas}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Faz H2-3: PG en kritik servis; çok fazla bellek vermek > host'u öldürür
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0
    # Faz H2-1+H2-3: log dosyalarının disk dolduramaması için cap
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - radio_network

  minio:
    image: minio/minio
    container_name: radio-minio
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}
      TZ: Europe/Istanbul
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - radio_network

  # Faz H1-4: günlük PostgreSQL yedek + MinIO mirror.
  # pg_dump -Fc | gzip her gece çalışır, MinIO'nun radio-backup bucket'ına
  # push edilir, 30 günden eski lokal kopyalar silinir.
  backup:
    build:
      context: ./docker/backup
    container_name: radio-backup
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-radio_saas}
      POSTGRES_USER: ${POSTGRES_USER:-radio_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      # Faz H5-3: audit_logs retention (gün). Master prompt yasal saklama
      # gereği için 180 gün, üstü silinir. backup-postgres.sh her döngüde
      # prune-yap.
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-180}
      TZ: Europe/Istanbul
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - radio_network

  minio-init:
    image: minio/mc
    container_name: radio-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    # Faz UX-disk: bucket lifecycle policy. radio-raw + radio-rendered TTL
    # 14 gün; radio-media (sponsor) kalıcı. Bu sayede 500 partner radyo
    # × 8 amaç × günlük 4 render senaryosunda disk birikmesi sınırlanır.
    # mc ilm rule add idempotent: aynı ID ile re-run ederse no-op.
    # MINIO_RAW_TTL_DAYS / MINIO_RENDERED_TTL_DAYS env ile override edilebilir.
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
       mc mb --ignore-existing local/radio-raw &&
       mc mb --ignore-existing local/radio-rendered &&
       mc mb --ignore-existing local/radio-media &&
       mc anonymous set download local/radio-media &&
       (mc ilm rule add --expire-days ${MINIO_RAW_TTL_DAYS:-7} local/radio-raw 2>/dev/null || echo '[ilm] raw rule already exists') &&
       (mc ilm rule add --expire-days ${MINIO_RENDERED_TTL_DAYS:-14} local/radio-rendered 2>/dev/null || echo '[ilm] rendered rule already exists') &&
       echo '[init] lifecycle policies applied'"
    networks:
      - radio_network

  # ============================================================================
  # Faz CTO-16 — PgBouncer transaction pooler.
  # PHP-FPM her request'te yeni PG connection açıyordu (~50-100ms latency).
  # PgBouncer pool'lar açık bekletir → PG'ye bağlanma zamanı sıfıra iner.
  #
  # Mode: transaction (PHP-FPM her request bir transaction = pool entry).
  # Default pool_size: 20 (PG max_connections=50 içinden 20'ye yetki).
  # PHP-FPM bağlantısı: DB_HOST=pgbouncer DB_PORT=6432 (postgres yerine).
  # ============================================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: radio-pgbouncer
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Backend Postgres bağlantısı (gerçek DB — pgbouncer'ın UPSTREAM'i)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-radio_saas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      DB_NAME: ${POSTGRES_DB:-radio_saas}
      # PgBouncer kendisi 6432 dinler (PG-standart 5432 ile çakışmasın)
      LISTEN_PORT: 6432
      # PgBouncer modu — transaction = en yüksek throughput, session affinity yok
      POOL_MODE: transaction
      # Pool ayarları
      MAX_CLIENT_CONN: 200       # PHP-FPM toplam paralel client (~3 worker × 50)
      DEFAULT_POOL_SIZE: 20       # PG'ye kalıcı 20 conn
      MIN_POOL_SIZE: 4
      RESERVE_POOL_SIZE: 4
      RESERVE_POOL_TIMEOUT: 5
      # Auth: trust internal network (Docker bridge zaten izolasyonu sağlar)
      AUTH_TYPE: scram-sha-256
      # Stats için admin user (PgBouncer dahili)
      ADMIN_USERS: ${POSTGRES_USER:-radio_saas}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD:-radio_saas_password} psql -h localhost -p 6432 -U ${POSTGRES_USER:-radio_saas} -d pgbouncer -c 'SHOW POOLS;' >/dev/null 2>&1 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radio_network

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: radio-php
    restart: unless-stopped
    # Faz H2-3: PHP-FPM 5 worker × ~256MB = 1.5GB ceiling
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-0}
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${POSTGRES_DB:-radio_saas}
      DB_USER: ${POSTGRES_USER:-radio_saas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_BUCKET_RAW: radio-raw
      MINIO_BUCKET_RENDERED: radio-rendered
      MINIO_BUCKET_PUBLIC: radio-media
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_REGION: us-east-1
      FFMPEG_RENDER_SCRIPT: /var/media-tools/ffmpeg/render_ad_injection.sh
      TZ: Europe/Istanbul
    volumes:
      - ./media:/var/media-tools:ro
      - media_work:/var/media
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Faz H2-1 / HOTFIX: PHP CLI çalışıyor + PID 1 master (CMD ["php-fpm"])
    # var = sağlıklı. `pgrep` Debian-slim'de yok (procps yüklü değil); bu
    # yüzden `/proc/1/comm` üzerinden master process'i doğruluyoruz.
    healthcheck:
      test: ["CMD-SHELL", "grep -q php-fpm /proc/1/comm && php -v >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      radio_network:
        aliases:
          - backend_api

  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: radio-migrate
    restart: "no"
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${POSTGRES_DB:-radio_saas}
      DB_USER: ${POSTGRES_USER:-radio_saas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      MIGRATIONS_PATH: /var/migrations
      TZ: Europe/Istanbul
    volumes:
      - ./sql:/var/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["php", "bin/migrate.php"]
    networks:
      - radio_network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: radio-worker
    restart: unless-stopped
    # Faz H2-3: worker FFmpeg sponsor injection yapar — render zirvesinde
    # 800MB+ rezerv eder. host'u öldürmesin diye sert tavan: 1GB.
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ${POSTGRES_DB:-radio_saas}
      DB_USER: ${POSTGRES_USER:-radio_saas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-radio_saas_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_BUCKET_RAW: radio-raw
      MINIO_BUCKET_RENDERED: radio-rendered
      MINIO_BUCKET_PUBLIC: radio-media
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      TZ: Europe/Istanbul
    volumes:
      - ./media:/var/media-tools:ro
      - media_work:/var/media
    depends_on:
      php-fpm:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["php", "bin/queue-worker.php"]
    # Faz H2-1 / HOTFIX: PID 1 = `php` (queue-worker.php). pgrep yok image'da;
    # /proc/1/cmdline'da queue-worker.php'yi arıyoruz.
    healthcheck:
      test: ["CMD-SHELL", "grep -q queue-worker.php /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - radio_network

  # =====================================================================
  # Faz H3-5 — Caddy TLS sidecar (opsiyonel)
  #
  # Aktif etmek için:
  #   docker compose --env-file .env.production \
  #     -f docker-compose.prod.yml --profile tls up -d
  #
  # Caddy önde durur, ACME ile Let's Encrypt sertifikası alır, nginx'e
  # plaintext HTTP olarak proxy yapar. nginx port 8080'i artık dışarı
  # publish ETMEMELİDİR — Caddy aynı network'ten erişir.
  #
  # Konfigürasyon (.env.production):
  #   APP_URL=https://radio.example.com       (Caddy bu domain için cert alır)
  #   ACME_EMAIL=ops@example.com              (Let's Encrypt zorunlu)
  #
  # Sertifika ve session datası volume'da kalır → restart'ta yeniden
  # cert üretmez (LE rate limit).
  # =====================================================================
  caddy:
    image: caddy:2.8-alpine
    container_name: radio-caddy
    profiles: ["tls"]
    restart: unless-stopped
    mem_limit: 128m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    environment:
      APP_URL: ${APP_URL:-https://radio.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-ops@example.com}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - radio_network

  nginx:
    image: nginx:1.27-alpine
    container_name: radio-nginx
    restart: unless-stopped
    mem_limit: 128m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    ports:
      # Caddy profile aktifse 8080 publish edilmesi PROD'da kapatılmalı:
      # nginx Caddy ardında dahili kalır. Şimdilik geri-uyumluluk için bırakıyoruz.
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      # Faz H2-1: php-fpm sağlıklı olmadan nginx trafiği almasın — başlangıç
      # anında 502 patlamasını engeller.
      php-fpm:
        condition: service_healthy
    healthcheck:
      # nginx kendine HEAD atar; binary canlı + config yüklü ise 200/301/404 döner.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - radio_network

  frontend:
    image: node:22-alpine
    container_name: radio-frontend
    profiles: ["dev"]
    restart: unless-stopped
    working_dir: /app
    environment:
      HOST: 0.0.0.0
      VITE_GLOB_API_URL: /api/v1
      VITE_PROXY: '[["/api/v1","http://nginx:80"]]'
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -lc "npm ci && exec npm run dev -- --host ${HOST:-0.0.0.0} --port 3000 --strictPort"
    healthcheck:
      test: ["CMD-SHELL", "wget --header='Host: localhost:3000' -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 12
    networks:
      - radio_network

  liquidsoap:
    build:
      context: .
      dockerfile: docker/liquidsoap/Dockerfile
    container_name: radio-liquidsoap
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    environment:
      TZ: Europe/Istanbul
      SOURCE_ROOT: /var/media
      OUTPUT_ROOT: /var/media/rendered
      STREAM_NAME: Regional Radio SaaS
    volumes:
      - media_work:/var/media
      - ./media/liquidsoap:/opt/liquidsoap:ro
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Faz H2-1: liquidsoap process canlı mı?
    healthcheck:
      test: ["CMD-SHELL", "pgrep liquidsoap >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - radio_network

volumes:
  postgres_data:
  minio_data:
  media_work:
  frontend_node_modules:
  backup_data:
  # Faz H3-5: Caddy ACME sertifikaları + state. Restart'ta LE rate-limit
  # tetiklememek için kalıcı volume şart.
  caddy_data:
  caddy_config:

networks:
  radio_network:
    driver: bridge
