map $http_origin $cors_allow_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    "~^https?://192\.168\.[0-9]+\.[0-9]+(:[0-9]+)?$" $http_origin;
    "~^https?://10\.[0-9]+\.[0-9]+\.[0-9]+(:[0-9]+)?$" $http_origin;
    "~^https://([a-z0-9-]+\.)*example\.com$" $http_origin;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 256m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_api backend_api:9000;

    # Single page application entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static caching for immutable frontend assets.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API gateway for the PHP backend.
    location ^~ /api/v1/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_param HTTP_ORIGIN $http_origin;
        fastcgi_param HTTP_HOST $host;
        fastcgi_pass $backend_api;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Api-Token, X-Requested-By" always;
        add_header Access-Control-Expose-Headers "ETag, Content-Disposition, Content-Length" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # PHP front controller fallback for any direct php requests.
    location ~ \.php$ {
        return 404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
