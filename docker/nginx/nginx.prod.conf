map $http_origin $cors_allow_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "~^https?://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    "~^https?://192\.168\.[0-9]+\.[0-9]+(:[0-9]+)?$" $http_origin;
    "~^https?://10\.[0-9]+\.[0-9]+\.[0-9]+(:[0-9]+)?$" $http_origin;
    # PLACEHOLDER: replace example.com with your production panel domain(s) before going live.
    "~^https://([a-z0-9-]+\.)*example\.com$" $http_origin;
}

# Faz H2-4 — Rate limit zones.
# - api:       genel API trafiği (login dışı). IP başına 20 req/sn, kısa burst.
# - login:     brute-force koruması — 5 req/sn IP başına, sert. Backend zaten
#              kullanıcı+IP throttle uyguluyor (LoginThrottle); bu nginx
#              katmanı ilk savunma hattı.
# - upload:    medya yükleme — daha tolerant ama yine de cap'li.
# Zone'lar http {} bağlamında tanımlanmalı; nginx ana config'te include
# edilecek, ama burada server-level yine de çalışır çünkü map gibi http
# scope'tadır (conf.d/default.conf nginx.conf'un http {} block'una dahil).
limit_req_zone $binary_remote_addr zone=api:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
# Tek IP başına eşzamanlı bağlantı sınırı (slowloris benzeri saldırılara)
limit_conn_zone $binary_remote_addr zone=ip_conn:10m;
# Rate limit aşıldığında 429 dön
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 256m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_api backend_api:9000;

    # Faz H2-4: Tek IP'ye eşzamanlı 50 bağlantı tavanı (slowloris koruması)
    limit_conn ip_conn 50;

    # Baseline security headers. Inherited by locations that do not set their own
    # add_header (e.g. the SPA entry below); re-declared in /api/v1/ which overrides.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Single page application entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static caching for immutable frontend assets.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ==================================================================
    # Faz H2-4 — Auth endpoint'lerine sert rate limit.
    # /auth/login + /auth/token + /auth/refresh — brute force koruması.
    # location seçimi /api/v1/'den ÖNCE olduğu için bu özel match yakalanır.
    # Burst 3 = 3 isteğe kadar burada kuyrukla; nodelay = ek isteği reddet.
    # ==================================================================
    location ~ ^/api/v1/auth/(login|token|refresh|mfa/verify)$ {
        limit_req zone=login burst=3 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_pass $backend_api;
        fastcgi_read_timeout 30s;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Media upload — büyük dosya, ağır işlem; çok sıkı tut.
    location ~ ^/api/v1/media/upload$ {
        limit_req zone=upload burst=4 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_pass $backend_api;
        # Render queue submission tek istekte 30s'ye kadar sürebilir.
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # API gateway for the PHP backend.
    location ^~ /api/v1/ {
        # Faz H2-4: genel API'ye orta rate limit
        limit_req zone=api burst=40 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PORT $server_port;
        fastcgi_param HTTP_ORIGIN $http_origin;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_COOKIE $http_cookie;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_pass $backend_api;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        add_header Access-Control-Allow-Origin $cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-Api-Token, X-Requested-By" always;
        add_header Access-Control-Expose-Headers "ETag, Content-Disposition, Content-Length" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # PHP front controller fallback for any direct php requests.
    location ~ \.php$ {
        return 404;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
