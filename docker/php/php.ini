memory_limit=512M
upload_max_filesize=128M
post_max_size=128M
max_execution_time=300
date.timezone=Europe/Istanbul
expose_php=0

opcache.enable=1
opcache.enable_cli=1
opcache.jit=1255
opcache.jit_buffer_size=64M
opcache.validate_timestamps=0

; ===== Faz H1-1: production error chrome =====
; PHP fatal/parse/OOM hatasının istemciye sızmasını engelle. Yalnızca
; stderr'e (container log driver json-file'a yazar) log basılır; HTTP
; gövdesinde HTML stack trace ASLA çıkmaz. Bu, NOC sayfasının PG düştüğünde
; 200 + HTML body görmesini önler.
display_errors=Off
display_startup_errors=Off
html_errors=Off
log_errors=On
error_log=/proc/self/fd/2
; E_ALL & ~E_DEPRECATED & ~E_STRICT — strict_types ile birlikte güvenli
error_reporting=22527

; Session pekiştirme (cookie zaten httponly + samesite=lax)
session.cookie_httponly=1
session.cookie_samesite=Lax
session.use_strict_mode=1
