; Faz UX-tune: PHP-FPM pool sıkılaştırma (8 GB RAM sunucu için).
; Default php-fpm conf 5+ child açar, her biri peak 256 MB tutar
; → 1.5 GB tek başına PHP. 8 GB RAM sunucuda bu PG + MinIO + Worker
; ile birlikte swap'a düşürebilir.
;
; Strateji:
;   - pm = dynamic (start_servers'tan max_children'e burst)
;   - max_children = 3   (peak ~750 MB → mem_limit 1g içinde rahat)
;   - start = 1, min_spare = 1, max_spare = 2
;   - max_requests = 500 (worker memory leak guard — opcache reset)
;
; 500 partner radyo trafiğinde 3 worker yeterli çünkü:
;   - admin trafik az (10-20 admin)
;   - partner portal istekleri kısa (cache + opcache.jit)
;   - render işi worker container'da (php-fpm değil)

[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data

; Faz CTO-9: 3 worker'la load test %61 fail (50 VU'da P95=6.6s).
; 8GB RAM sunucuda: 8 worker × 200MB peak = 1.6GB. PG max_connections=50
; (3 PHP × 1 + worker + backup + bol marj kalır).
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Process status için (debugging)
pm.status_path = /fpm-status

; Slow request log
request_terminate_timeout = 60s
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; Worker stdout → container log
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
