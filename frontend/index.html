<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Radio SaaS Platform" />
    <title>Aircast Pro · Yayın Yönetimi</title>

    <!-- Fonts: preconnect + non-render-blocking load (media swap) so the bundle
         CSS never blocks on a third-party @import. Falls back to system-ui. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <!-- Inline splash paints immediately (before the JS bundle executes) so the
         SPA has a fast First Contentful Paint instead of a blank screen. It is
         replaced the moment Vue mounts into #app. -->
    <style>
      html,body{margin:0;background:#090d16;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
      #app-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
      #app-splash .s-logo{font-size:40px}
      #app-splash .s-name{font-size:18px;font-weight:800;letter-spacing:-0.02em}
      #app-splash .s-bar{width:120px;height:3px;border-radius:3px;background:rgba(148,163,184,.18);overflow:hidden}
      #app-splash .s-bar::after{content:'';display:block;height:100%;width:40%;border-radius:3px;background:#e11d48;animation:s-load 1s infinite}
      @keyframes s-load{0%{transform:translateX(-100%)}100%{transform:translateX(320%)}}
      #app:not(:empty)+#app-splash{display:none}
    </style>
    <div id="app"></div>
    <div id="app-splash" aria-hidden="true">
      <span class="s-logo">📻</span>
      <span class="s-name">Aircast Pro</span>
      <span class="s-bar"></span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
